<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація - Smart Grid Security</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <main class="auth-card">
    <h1>🛡️ Реєстрація</h1>
    <p class="subtitle">Створення користувача з роллю доступу</p>
    <form id="registerForm">
      <div class="form-group"><label for="name">ПІБ</label><input id="name" name="name" required minlength="2"></div>
      <div class="form-group"><label for="email">Email</label><input id="email" name="email" type="email" required></div>
      <div class="form-group"><label for="password">Пароль</label><input id="password" name="password" type="password" required minlength="8" placeholder="Мін. 8 символів, велика літера і цифра"></div>
      <div class="form-group">
        <label for="role">Роль</label>
        <select id="role" name="role" required>
          <option value="operator">operator</option>
          <option value="analyst">analyst</option>
          <option value="administrator">administrator</option>
        </select>
      </div>
      <button class="btn-primary" type="submit">Зареєструвати</button>
    </form>
    <div id="message" class="message"></div>
    <p class="switch-link"><a href="login.html">Повернутися до входу</a></p>
  </main>
  <script src="common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', refreshCsrf);
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = Object.fromEntries(new FormData(e.target));
      try {
        const response = await secureFetch('/auth/register', { method: 'POST', body: JSON.stringify(formData) });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || (result.errors ? result.errors[0].msg : 'Помилка реєстрації'));
        showMessage('message', 'success', result.message);
        e.target.reset();
      } catch (error) {
        showMessage('message', 'error', error.message);
      }
    });
  </script>
</body>
</html>
