<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель Smart Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
  <header class="topbar">
    <h1>⚡ Smart Grid Security Dashboard</h1>
    <div class="actions">
      <span id="userInfo">...</span>
      <button id="logoutBtn" class="btn-danger">Вийти</button>
    </div>
  </header>
  <main class="container">
    <section class="grid">
      <article class="card">
        <h3>Баланс мережі</h3>
        <p id="balance" class="metric">-- МВт</p>
        <span id="balanceStatus" class="badge warning">--</span>
      </article>
      <article class="card">
        <h3>Генерація</h3>
        <p id="generation" class="metric">-- МВт</p>
      </article>
      <article class="card">
        <h3>Навантаження</h3>
        <p id="load" class="metric">-- МВт</p>
      </article>
      <article class="card">
        <h3>Частота</h3>
        <p id="frequency" class="metric">-- Гц</p>
      </article>
      <article class="card">
        <h3>ВДЕ</h3>
        <p id="renewable" class="metric">-- %</p>
      </article>
      <article class="card">
        <h3>Тривоги</h3>
        <p id="alarms" class="metric">--</p>
      </article>
    </section>

    <section id="operatorPanel" class="card section-title hidden">
      <h2>Коригування балансу (operator)</h2>
      <form id="adjustForm" class="grid">
        <div><label>Генерація, МВт</label><input type="number" step="0.1" name="generationMW" value="250"></div>
        <div><label>Навантаження, МВт</label><input type="number" step="0.1" name="loadMW" value="240"></div>
        <div><label>Накопичувач, МВт</label><input type="number" step="0.1" name="storageMW" value="10"></div>
        <div><label>Коментар</label><input type="text" name="comment" value="Планове коригування"></div>
        <div><button class="btn-primary" type="submit">Оновити баланс</button></div>
      </form>
    </section>

    <section id="analystPanel" class="section-title hidden">
      <h2>Прогнози навантаження (analyst)</h2>
      <div class="table-wrap"><table id="forecastTable"></table></div>
    </section>

    <section id="adminPanel" class="card section-title hidden">
      <h2>Конфігурація системи (administrator)</h2>
      <form id="configForm" class="grid">
        <div><label>Режим балансування</label><select name="balancingMode"><option value="auto">auto</option><option value="manual">manual</option><option value="emergency">emergency</option></select></div>
        <div><label>Макс. відхилення частоти</label><input type="number" step="0.01" name="maxFrequencyDeviation" value="0.2"></div>
        <div><label>Demand Response</label><select name="demandResponseEnabled"><option value="true">true</option><option value="false">false</option></select></div>
        <div><label>Горизонт прогнозу, год</label><input type="number" name="forecastHorizonHours" value="24"></div>
        <div><button class="btn-primary" type="submit">Зберегти конфігурацію</button></div>
      </form>
      <h3>Журнал безпеки</h3>
      <div class="table-wrap"><table id="logsTable"></table></div>
    </section>

    <div id="message" class="message"></div>
  </main>
  <script src="common.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
